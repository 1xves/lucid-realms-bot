name: "⏰ Optimize Upload Schedule (Wednesday 6 AM ET)"

on:
  schedule:
    - cron: "0 10 * * 3"   # 6 AM EDT (UTC-4). Change to '0 11 * * 3' for EST
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/1xves/lucid-realms-bot:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run schedule optimizer
        env:
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GH_PAT:                 ${{ secrets.GH_PAT }}
        run: python optimize_schedule.py

      - name: Commit updated files
        run: |
          git config --local user.email "lucid-realms-bot@users.noreply.github.com"
          git config --local user.name "LUCID REALMS Bot"
          git pull --rebase origin main
          git add analytics_log.json config.json
          git diff --staged --quiet || git commit -m "⏰ Schedule optimization update [skip ci]"
          git push
