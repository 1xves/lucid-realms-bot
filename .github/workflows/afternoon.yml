name: "🌤 Afternoon Short (3 PM ET)"

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/1xves/lucid-realms-bot:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and upload Short
        env:
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          UPLOAD_SLOT:            afternoon
          RUNWAY_API_KEY:         ${{ secrets.RUNWAY_API_KEY }}
        run: python generate_and_upload.py

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory "*"
          git config --local user.email "lucid-realms-bot@users.noreply.github.com"
          git config --local user.name "LUCID REALMS Bot"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git pull --rebase origin main
          git add analytics_log.json
          git diff --staged --quiet || git commit -m "Afternoon upload log [skip ci]"
          git push
