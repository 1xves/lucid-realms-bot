name: "🏁 Weekly Milestone Watch (Sunday 10 AM ET)"

on:
  schedule:
    - cron: "0 14 * * 0"   # 10 AM EDT (UTC-4). Change to '0 15 * * 0' for EST (UTC-5, Nov-Mar)
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run milestone watcher
        env:
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID:     ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GH_PAT:                ${{ secrets.GH_PAT }}
        run: python milestone_watch.py

      - name: Commit updated files
        run: |
          git config --local user.email "lucid-realms-bot@users.noreply.github.com"
          git config --local user.name "LUCID REALMS Bot"
          git pull --rebase origin main
          git add config.json analytics_log.json
          git diff --staged --quiet || git commit -m "🏁 Milestone check update [skip ci]"
          git push
