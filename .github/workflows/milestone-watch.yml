name: "🏆 Weekly Milestone Watch (Sunday 10 AM ET)"

on:
  schedule:
    - cron: "0 14 * * 0"
  workflow_dispatch:

jobs:
  watch:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/1xves/lucid-realms-bot:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run milestone watch
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          YOUTUBE_CLIENT_ID:  ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          GITHUB_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
        run: python milestone_watch.py

      - name: Commit changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global --add safe.directory "*"
          git config --local user.email "lucid-realms-bot@users.noreply.github.com"
          git config --local user.name "LUCID REALMS Bot"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git
          git stash
          git pull --rebase origin main
          git stash pop
          git add config.json
          git diff --staged --quiet || git commit -m "Milestone watch update [skip ci]"
          git push
